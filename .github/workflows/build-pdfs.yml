name: Build PDFs

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: pandoc/extra:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install fonts
        run: |
          apt-get update -qq && apt-get install -y -qq fonts-liberation fonts-cascadia-code
          # fonts-liberation provides Liberation Serif (metrically compatible with Times/Georgia)
          # Update font cache
          fc-cache -fv

      - name: Build PDFs
        run: |
          mkdir -p dist
          TEMPLATE="documents/src/resinsight-template.latex"
          LOGO="documents/src/logo.png"

          LOGO_FLAG=""
          if [ -f "$LOGO" ]; then
            LOGO_FLAG="--variable logopath=$LOGO"
          fi

          for f in documents/src/*.md; do
            name=$(basename "$f" .md)
            echo "Building $name.pdf"
            pandoc "$f" \
              --pdf-engine=xelatex \
              --template="$TEMPLATE" \
              --resource-path="$(dirname "$f"):." \
              --toc \
              --variable mainfont="Liberation Serif" \
              --variable sansfont="Liberation Sans" \
              --variable monofont="Cascadia Mono" \
              $LOGO_FLAG \
              -o "dist/${name}.pdf"
          done

      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tutorial-pdfs
          path: dist/*.pdf
          retention-days: 30

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pdf
